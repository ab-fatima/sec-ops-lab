---
- name: "Hardening Ubuntu1 — CIS Benchmark Level 1"
  hosts: ubuntu_cible
  become: yes

  tasks:

    - name: "[CIS 5.2.4] Interdire login root en SSH"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: restart_sshd

    - name: "[CIS 5.2.13] Max tentatives SSH = 3"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
      notify: restart_sshd

    - name: "[CIS 5.2.11] Timeout SSH = 300s"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
      notify: restart_sshd

    - name: "[CIS 3.5.1.1] Installer UFW"
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: yes

    - name: "[CIS 3.5.1.2] Autoriser SSH"
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: "[CIS 3.5.1.4] Activer UFW"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: "[CIS 5.4.1] Installer libpam-pwquality"
      ansible.builtin.apt:
        name: libpam-pwquality
        state: present

    - name: "[CIS 5.4.1] Longueur min mot de passe = 14"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?minlen'
        line: 'minlen = 14'

    - name: "[CIS 4.1.1] Installer auditd"
      ansible.builtin.apt:
        name: auditd
        state: present

    - name: "[CIS 4.1.1] Activer auditd"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: yes

    - name: "[CIS 3.1.1] Désactiver IP Forwarding"
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        state: present
        reload: yes

 