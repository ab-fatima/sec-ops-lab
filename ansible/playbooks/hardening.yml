---
# =============================================================
#  SEC-OPS LAB — Playbook de Hardening Ubuntu 26.04
#  Référentiel : CIS Benchmark Ubuntu Level 1 Server
#  Auteur      : ABDALLI Fatima — ENSIASD / CHU Mohammed VI
#  Date        : Juin 2026
# =============================================================

- name: "Hardening Ubuntu — CIS Benchmark Level 1 Server"
  hosts: ubuntu_cible
  become: yes

  tasks:

    # ══════════════════════════════════════════════════════
    # BLOC 1 : DURCISSEMENT SSH (CIS 5.2.x)
    # ══════════════════════════════════════════════════════

    - name: "[CIS 5.2.4] Interdire le login root en SSH"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
        backup: yes
      notify: restart_sshd

    - name: "[CIS 5.2.13] Limiter les tentatives d'authentification SSH à 3"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
        state: present
      notify: restart_sshd

    - name: "[CIS 5.2.11] Configurer le timeout de session SSH à 300 secondes"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
        state: present
      notify: restart_sshd

    - name: "[CIS 5.2.6] Désactiver le X11 Forwarding"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
        state: present
      notify: restart_sshd

    # ══════════════════════════════════════════════════════
    # BLOC 2 : PARE-FEU UFW (CIS 3.5.x)
    # ══════════════════════════════════════════════════════

    - name: "[CIS 3.5.1.1] Installer le pare-feu UFW"
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: yes

    - name: "[CIS 3.5.1.2] Autoriser SSH avant activation UFW (éviter le lockout)"
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: "[CIS 3.5.1.4] Activer UFW avec politique deny-all en entrée"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # ══════════════════════════════════════════════════════
    # BLOC 3 : POLITIQUE MOTS DE PASSE (CIS 5.4.x)
    # ══════════════════════════════════════════════════════

    - name: "[CIS 5.4.1] Installer libpam-pwquality pour la politique de complexité"
      ansible.builtin.apt:
        name: libpam-pwquality
        state: present

    - name: "[CIS 5.4.1] Imposer une longueur minimale de 14 caractères"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?minlen'
        line: 'minlen = 14'
        state: present

    - name: "[CIS 5.4.1] Exiger au moins 3 classes de caractères"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?minclass'
        line: 'minclass = 3'
        state: present

    # ══════════════════════════════════════════════════════
    # BLOC 4 : JOURNALISATION / AUDIT (CIS 4.1.x)
    # ══════════════════════════════════════════════════════

    - name: "[CIS 4.1.1] Installer le démon d'audit auditd"
      ansible.builtin.apt:
        name:
          - auditd
          - audispd-plugins
        state: present

    - name: "[CIS 4.1.1] Activer et démarrer auditd au boot"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: yes

    # ══════════════════════════════════════════════════════
    # BLOC 5 : PARAMÈTRES RÉSEAU KERNEL (CIS 3.1.x - 3.3.x)
    # ══════════════════════════════════════════════════════

    - name: "[CIS 3.1.1] Désactiver l'IP Forwarding"
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        state: present
        reload: yes

   

  # ══════════════════════════════════════════════════════
  # HANDLERS
  # ══════════════════════════════════════════════════════

  handlers:
    - name: restart_sshd
      ansible.builtin.command:
        cmd: systemctl restart sshd
